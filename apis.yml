aid: actioniq
name: ActionIQ
description: >-
  ActionIQ is an enterprise customer data platform (CDP) that provides a REST
  API for managing customer profiles, building audiences, orchestrating
  campaigns, and activating data across marketing channels. The platform offers
  a Profile API for real-time personalization, enabling businesses to access
  customer identities, attributes, and audience membership within milliseconds
  to power web personalization, call center decisioning, and real-time customer
  experiences. ActionIQ was acquired by Uniphore in December 2024 and is now
  offered as part of Uniphore's composable CDP platform.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/actioniq/refs/heads/main/apis.yml
