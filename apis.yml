apis:
  - aid: actioniq:profile-api
    name: ActionIQ Profile API
    description: >-
      The ActionIQ Profile API provides real-time access to customer identities,
      attributes, and audience membership within milliseconds. It powers
      inbound decisioning use cases such as web personalization and call center
      support, connecting data warehouse intelligence directly to customer
      experience applications. The API supports integration with personalization
      engines including Adobe Target and Moveable Ink.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.actioniq.com/blog/actioniq-profile-api/
    baseURL: https://api.actioniq.com
    tags:
      - Profile
      - Real-Time Personalization
      - Audience
      - Customer Data
    properties:
      - type: Documentation
        url: https://www.actioniq.com/library/
      - type: Authentication
        url: https://www.actioniq.com/security/
  - aid: actioniq:data-ingestion-api
    name: ActionIQ Data Ingestion API
    description: >-
      ActionIQ provides a real-time REST API endpoint for streaming customer
      event data into the platform. The ingestion API supports push-based
      streaming from in-house systems, enabling businesses to capture real-time
      clickstream events and other behavioral data for immediate use in audience
      segmentation and campaign orchestration.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.actioniq.com/library/
    baseURL: https://api.actioniq.com
    tags:
      - Data Ingestion
      - Streaming
      - Events
      - REST
    properties:
      - type: Documentation
        url: https://www.actioniq.com/library/
